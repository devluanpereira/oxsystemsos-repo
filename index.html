<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OXSystemsOS pacman repo</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Noto Sans", sans-serif;
      background: linear-gradient(135deg, #f3f7fa, #dcebf7);
      color: #0f2e45;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    main {
      width: min(820px, 92vw);
      background: #ffffffee;
      border: 1px solid #c8dceb;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 14px 32px rgba(10, 39, 62, 0.1);
    }
    h1 { margin-top: 0; font-size: 1.8rem; }
    code {
      background: #e8f3fb;
      padding: 0.15rem 0.4rem;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    ul { line-height: 1.6; }
  </style>
</head>
<body>
  <main>
    <h1>OXSystemsOS pacman repository</h1>
    <p>GitHub Pages host for OXSystemsOS packages and repository metadata.</p>
    <ul>
      <li>Architecture path: <code>/x86_64/</code></li>
      <li>Repository base URL: <code>https://devluanpereira.github.io/oxsystemsos-repo/$arch</code></li>
    </ul>
  </main>
</body>
</html>

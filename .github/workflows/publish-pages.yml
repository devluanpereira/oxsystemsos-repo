name: Publish OXSystemsOS pacman repo

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      OX_REPO_GPG_PRIVATE_KEY: ${{ secrets.OX_REPO_GPG_PRIVATE_KEY }}
      OX_REPO_GPG_KEY_ID: ${{ secrets.OX_REPO_GPG_KEY_ID }}
      OX_REPO_GPG_PASSPHRASE: ${{ secrets.OX_REPO_GPG_PASSPHRASE }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import repository signing key (optional)
        if: ${{ env.OX_REPO_GPG_PRIVATE_KEY != '' }}
        run: |
          set -euo pipefail
          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"
          printf '%s\n' "${OX_REPO_GPG_PRIVATE_KEY}" | gpg --batch --import
          echo "GNUPGHOME=${GNUPGHOME}" >> "${GITHUB_ENV}"

      - name: Ensure repository layout
        run: |
          set -euo pipefail
          mkdir -p x86_64

      - name: Rebuild repository database when packages exist
        run: |
          set -euo pipefail
          if compgen -G "x86_64/*.pkg.tar.zst" > /dev/null; then
            docker run --rm \
              -v "$PWD:/repo" \
              -w /repo \
              archlinux:latest \
              bash -lc '
                set -euo pipefail
                pacman -Sy --noconfirm pacman-contrib
                repo-add -R x86_64/oxsystemsos.db.tar.gz x86_64/*.pkg.tar.zst
              '
          else
            echo "No *.pkg.tar.zst packages found in x86_64/. Skipping repo-add."
          fi

      - name: Sign repository database files (optional)
        if: ${{ env.OX_REPO_GPG_PRIVATE_KEY != '' && env.OX_REPO_GPG_KEY_ID != '' }}
        env:
          GPG_KEY_ID: ${{ env.OX_REPO_GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ env.OX_REPO_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          sign_db() {
            local file="$1"
            if [[ ! -f "${file}" ]]; then
              return 0
            fi

            local -a cmd=(
              gpg
              --batch
              --yes
              --pinentry-mode
              loopback
              --local-user
              "${GPG_KEY_ID}"
            )

            if [[ -n "${GPG_PASSPHRASE:-}" ]]; then
              cmd+=(--passphrase "${GPG_PASSPHRASE}")
            fi

            cmd+=(--detach-sign --output "${file}.sig" "${file}")
            "${cmd[@]}"
          }

          sign_db x86_64/oxsystemsos.db
          sign_db x86_64/oxsystemsos.db.tar.gz
          sign_db x86_64/oxsystemsos.files
          sign_db x86_64/oxsystemsos.files.tar.gz

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
